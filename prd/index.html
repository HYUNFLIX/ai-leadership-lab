<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>바이브코딩 PRD 생성기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.css">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <header class="header">
    <div class="brand" id="brandLink" title="처음 화면으로">
      <div class="brand-mark">P</div>
      <div class="brand-text">
        <h1>PRD 생성기</h1>
        <p>직장인을 위한 바이브코딩 제품 기획 도우미</p>
      </div>
    </div>
    <div class="header-right">
      <div class="header-meta">
        <span class="saved-dot"></span>
        <span class="header-meta-label" id="savedLabel">자동 저장됨</span>
        <span class="header-meta-sep"></span>
        <span class="header-meta-time" id="savedTime">--:--:--</span>
      </div>
      <button class="reset-btn" id="resetBtn" title="모든 입력 초기화">
        <span class="reset-icon">↺</span>
        <span>전체 초기화</span>
      </button>
    </div>
  </header>
  <div class="progress" id="progress"></div>
  <main class="card" id="card"></main>
  <footer class="app-footer">
    <div class="copyright">© 2026 AI Leadership Lab. All rights reserved.</div>
  </footer>
</div>
<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
